#################################
#           Backend             #
#################################
# For AMD er 'glx' som regel best, men 'xrender' kan gi bedre batteritid.
backend = "glx";
#glx-no-stencil = true;
#glx-no-rebind-pixmap = true;
use-damage = true;

#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.05;  # Litt raskere for å føles mer responsivt på laptop
fade-out-step = 0.05;
fade-delta = 5;

#################################
#           Opacity             #
#################################
inactive-opacity = 0.90; # Økt litt fra 0.85 for bedre lesbarhet på mindre skjerm
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;

# Fokus-regler
focus-exclude = [ 
  "class_g = 'Cairo-clock'",
  "class_g = 'slock'"     # Unngå tull med skjermlås
];

opacity-rule = [
  "100:class_g = 'St' && !focused",
  "100:class_g = 'Alacritty' && focused",
  "90:class_g = 'Alacritty' && !focused",
  "100:class_g = 'Firefox'",
  "100:class_g = 'Steam'",
  "100:class_g = 'mpv'"   # Video skal alltid være 100%
];

#################################
#       AMD / Generelt          #
#################################
vsync = true; # AMD-driveren håndterer vsync bra med picom

# Optimaliseringer for integrert grafikk
mark-wmwin-focused = true;
mark-ovlp-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

# Fjern dithered-present da det er mer relevant for NVIDIA/X11-bugs
