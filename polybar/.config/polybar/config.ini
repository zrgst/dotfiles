; =========================================================
; Polybar - Tokyo Night desktop config for herbstluftwm
; Desktop: 2560x1440
; =========================================================

[colors]
bg = #1a1b26
bg-alt = #16161e
fg = #c0caf5
muted = #565f89

blue = #7aa2f7
cyan = #7dcfff
green = #9ece6a
yellow = #e0af68
red = #f7768e
magenta = #bb9af7
orange = #ff9e64
teal = #73daca

border = #414868

[module-colors]
ws = ${colors.blue}
title = ${colors.cyan}
cpu = ${colors.red}
memory = ${colors.yellow}
temp = ${colors.orange}
network = ${colors.magenta}
volume = ${colors.green}
date = ${colors.yellow}

[bar/main]
width = 100%
height = 32
radius = 10

offset-x = 0
offset-y = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0
border-size = 1
border-color = ${colors.border}

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 1

separator =  | 
separator-foreground = ${colors.border}

font-0 = JetBrainsMono Nerd Font:size=11;2
font-1 = JetBrainsMono Nerd Font:size=14;3

modules-left = hlwm-workspaces
modules-center = xwindow
modules-right = cpu memory temperature network volume date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = generic
override-redirect = false

tray-position = right
tray-padding = 2
tray-background = ${colors.bg}

pseudo-transparency = false

; Sett denne hvis Polybar havner på feil skjerm:
; monitor = DP-1

[module/hlwm-workspaces]
type = custom/script
exec = ~/.config/polybar/scripts/herbstluftwm-workspaces.sh
tail = true
format = <label>
label = %output%

[module/xwindow]
type = internal/xwindow
label = %title:0:70:...%
label-foreground = ${module-colors.title}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = 󰍛 CPU %percentage%%
label-foreground = ${module-colors.cpu}

[module/memory]
type = internal/memory
interval = 3
format = <label>
label = 󰘚 RAM %percentage_used%%
label-foreground = ${module-colors.memory}

[module/temperature]
type = internal/temperature
interval = 3
thermal-zone = 0
warn-temperature = 80

format = <label>
format-warn = <label-warn>

label = 󰔏 %temperature-c%
label-foreground = ${module-colors.temp}

label-warn = 󰸁 %temperature-c%
label-warn-foreground = ${colors.red}

[module/network]
type = internal/network
interface-type = wireless
interval = 3

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = 󰖩 %essid%
label-connected-foreground = ${module-colors.network}

label-disconnected = 󰖪 offline
label-disconnected-foreground = ${colors.muted}

[module/volume]
type = internal/pulseaudio

format-volume = <label-volume>
format-muted = <label-muted>

label-volume = 󰕾 %percentage%%
label-volume-foreground = ${module-colors.volume}

label-muted = 󰖁 muted
label-muted-foreground = ${colors.muted}

[module/date]
type = internal/date
interval = 1

date = %a %d.%m.%Y
time = %H:%M

format = <label>
label = 󰃭 %date% 󰥔 %time%
label-foreground = ${module-colors.date}
